app = 'ranqia-workspace'
primary_region = 'ams'

[build]

[env]
  # ADMIN_ROLE_ID = '000000000000000000'
  # GITHUB_ORG = 'ranqialabs'
  # GUILD_ID = '000000000000000000'
  # REPO_TO_CHANNEL = '{"ranqialabs/workspace":000000000000000000}'
  # TEAM_TO_ROLE = '{"engineering":000000000000000000}'
  # WEBHOOK_PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

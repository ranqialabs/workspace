# fly.toml app configuration file generated for ranqia-workspace on 2026-07-17T19:53:18Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ranqia-workspace'
primary_region = 'ams'

[build]

# The only non-secret config. Everything else (guild, admins, team/repo/identity
# mappings) is discovered at runtime or set via commands. Secrets go through
# `fly secrets`: DISCORD_TOKEN, GITHUB_APP_ID, GITHUB_APP_PRIVATE_KEY,
# GITHUB_WEBHOOK_SECRET.
[env]
  GITHUB_ORG = 'ranqialabs'
  WEBHOOK_PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
